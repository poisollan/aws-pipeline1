AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 instance for Pipeline 1 infrastructure demo

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair name

Resources:
  DevOpsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0c02fb55956c7d316
      KeyName: !Ref KeyName
      SubnetId: !ImportValue DevOpsPublicSubnetOne
      SecurityGroupIds:
        - !ImportValue DevOpsEC2SecurityGroup
      IamInstanceProfile: !ImportValue DevOpsEC2InstanceProfile
      Tags:
        - Key: Name
          Value: devops-pipeline-ec2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>EC2 created by CloudFormation Pipeline 1</h1>" > /var/www/html/index.html

Outputs:
  EC2InstanceId:
    Value: !Ref DevOpsEC2Instance
    Export:
      Name: DevOpsEC2InstanceId

  EC2PublicIP:
    Value: !GetAtt DevOpsEC2Instance.PublicIp
    Export:
      Name: DevOpsEC2PublicIP
